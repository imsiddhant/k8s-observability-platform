---
# ============================================================
#  Master role
#  1. kubeadm init
#  2. Set up kubeconfig for vagrant user
#  3. Install Calico CNI (Tigera Operator)
#  4. Wait for master node Ready
#  5. Generate & expose join command for workers
# ============================================================

# ------------------------------------------------------------
#  Cluster initialisation (idempotent — skipped if admin.conf exists)
# ------------------------------------------------------------
- name: Check if cluster is already initialised
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init

- name: Initialise Kubernetes cluster with kubeadm
  command: >
    kubeadm init
    --pod-network-cidr={{ pod_cidr }}
    --apiserver-advertise-address={{ master_ip }}
    --node-name=k8s-master
  when: not kubeadm_init.stat.exists

# ------------------------------------------------------------
#  kubeconfig for the vagrant user
# ------------------------------------------------------------
- name: Create .kube directory for vagrant user
  file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0700'

- name: Copy admin.conf to vagrant user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    owner: vagrant
    group: vagrant
    mode: '0600'
    remote_src: yes

# ------------------------------------------------------------
#  Calico CNI — Tigera Operator method
# ------------------------------------------------------------
- name: Install Tigera Operator
  become: false
  command: >
    kubectl apply --server-side --force-conflicts -f
    https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

- name: Download Calico custom-resources manifest
  get_url:
    url: https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml
    dest: /tmp/calico-custom-resources.yaml
    mode: '0644'

- name: Set pod CIDR in Calico manifest to match kubeadm init
  replace:
    path: /tmp/calico-custom-resources.yaml
    regexp: '192\.168\.0\.0/16'
    replace: "{{ pod_cidr }}"

- name: Apply Calico custom resources
  become: false
  command: kubectl apply -f /tmp/calico-custom-resources.yaml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

# ------------------------------------------------------------
#  Wait for master to reach Ready state before workers join
# ------------------------------------------------------------
- name: Wait for k8s-master node to be Ready (up to 3 min)
  become: false
  command: kubectl wait --for=condition=Ready node/k8s-master --timeout=180s
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

# ------------------------------------------------------------
#  Generate join command and expose it as a host fact
#  Workers read it via: hostvars['k8s-master']['join_command']
# ------------------------------------------------------------
- name: Generate worker join command
  command: kubeadm token create --print-join-command
  register: kubeadm_join_output

- name: Expose join command as Ansible fact
  set_fact:
    join_command: "{{ kubeadm_join_output.stdout }}"
