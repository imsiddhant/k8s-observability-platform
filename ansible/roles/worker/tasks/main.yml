---
# ============================================================
#  Worker role
#  Joins each worker node to the cluster using the join
#  command generated by the master role.
# ============================================================

- name: Check if node has already joined the cluster
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Join cluster using master join command
  command: "{{ hostvars['k8s-master']['join_command'] }}"
  when: not kubelet_conf.stat.exists
