apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
spec:
  project: default
  source:
    # Google's official microservices-demo repo
    # release/ contains both kubernetes-manifests.yaml AND istio-manifests.yaml
    # We only want the plain k8s manifests — exclude all Istio resources
    repoURL: https://github.com/GoogleCloudPlatform/microservices-demo
    targetRevision: HEAD
    path: release
    directory:
      include: "kubernetes-manifests.yaml"   # ignore istio-manifests.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique
  syncPolicy:
    automated:
      prune: true       # remove resources deleted from Git
      selfHeal: true    # revert manual cluster changes back to Git state
    syncOptions:
      - CreateNamespace=true   # ArgoCD creates online-boutique namespace
