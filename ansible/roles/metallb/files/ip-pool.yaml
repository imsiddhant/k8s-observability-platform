---
# IPAddressPool — the range MetalLB pulls IPs from
# Reserved at the top of the 192.168.56.0/24 subnet
# so it doesn't conflict with the cluster nodes (.10-.12)
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: lab-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.56.200-192.168.56.250

---
# L2Advertisement — tells MetalLB to announce IPs via ARP
# Layer 2 mode: no BGP router needed, works on any local network
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: lab-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - lab-pool
